host_network: false
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Trilium Notes web interface"
options:
  user_uid: 1000
  user_gid: 1000
schema:
  user_uid: "int(0,)"
  user_gid: "int(0,)"
